<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏夹 - 文学</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 组件容器 -->
    <div id="globalNav"></div>
    <div id="mobileMenu"></div>
    <div id="musicPlayer"></div>
    
    <div class="page-content" id="pageContent">
        <div id="mainContainer"></div>
    </div>
    
    <div id="cardModal"></div>
    <div id="deleteModal"></div>
    <div id="toast"></div>
    <div id="footer"></div>
    
    <script src="js/main.js"></script>
    <script src="js/components/commonComponents.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            Components.init();
            
            // 渲染全局导航
            Components.render('global-nav', 'globalNav', { currentPage: 'book' });
            
            // 渲染移动端菜单
            Components.render('mobile-menu', 'mobileMenu', { currentPage: 'book' });
            
            // 渲染音乐播放器
            Components.render('music-player', 'musicPlayer');
            
            // 渲染侧边栏（文学页面）
            const sidebarHtml = Components.Sidebar.render({
                currentPage: 'book',
                sectionTitle: '文学作品',
                showAddButton: true,
                showCarousel: true,
                showRanks: false
            });
            document.getElementById('mainContainer').innerHTML = sidebarHtml;
            
            // 渲染其他组件
            Components.render('modal', 'cardModal');
            Components.render('delete-modal', 'deleteModal');
            Components.render('toast', 'toast');
            Components.render('footer', 'footer');
        });
    </script>
</body>
</html>
